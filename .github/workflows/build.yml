name: Build WiFi Share APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Check out your code
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Download Gradle 8.2 manually (not pre-installed on runner)
      - name: Setup Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          GRADLE_BIN=/tmp/gradle-dist/gradle-8.2/bin/gradle
          chmod +x $GRADLE_BIN
          $GRADLE_BIN wrapper --gradle-version 8.2 --distribution-type bin
          chmod +x ./gradlew
          ls -lh gradle/wrapper/

      # 4. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 5. Create launcher icons
      - name: Create launcher icons
        run: |
          sudo apt-get install -y imagemagick -q 2>/dev/null
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            case $density in
              mdpi)    size=48  ;;
              hdpi)    size=72  ;;
              xhdpi)   size=96  ;;
              xxhdpi)  size=144 ;;
              xxxhdpi) size=192 ;;
            esac
            mkdir -p app/src/main/res/mipmap-${density}
            convert -size ${size}x${size} xc:"#1565C0" \
              app/src/main/res/mipmap-${density}/ic_launcher.png
            cp app/src/main/res/mipmap-${density}/ic_launcher.png \
               app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done
          echo "Icons created OK"

      # 6. Build debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 7. Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: WifiShare-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
